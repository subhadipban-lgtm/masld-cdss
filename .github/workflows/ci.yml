name: MASLD DrugScope CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------------
  # Lint — Python (ruff) + TypeScript (eslint)
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Python linting ---
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python linting tools
        run: pip install ruff

      - name: Ruff check (lint)
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

      # --- Frontend linting ---
      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install bun
        run: npm install -g bun@1

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint || true

  # -------------------------------------------------------------------------
  # Test Backend — unit tests only (no services needed)
  # -------------------------------------------------------------------------
  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Create backend requirements if missing
        run: |
          # Ensure requirements.txt exists for pip cache
          if [ ! -f backend/requirements.txt ]; then
            cat > backend/requirements.txt << 'REQEOF'
            numpy>=1.24.0
            pandas>=2.0.0
            scipy>=1.10.0
            scikit-learn>=1.3.0
            pytest>=7.4.0
            pytest-asyncio>=0.21.0
            REQEOF
          fi

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Run unit tests
        working-directory: backend
        run: pytest tests/ -v -m unit --tb=short

  # -------------------------------------------------------------------------
  # Test Frontend — lint only (full build tested in Docker)
  # -------------------------------------------------------------------------
  test-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install bun
        run: npm install -g bun@1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint || true

  # -------------------------------------------------------------------------
  # Security — dependency audit
  # -------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Create backend requirements if missing
        run: |
          if [ ! -f backend/requirements.txt ]; then
            cat > backend/requirements.txt << 'REQEOF'
            numpy>=1.24.0
            pandas>=2.0.0
            scipy>=1.10.0
            scikit-learn>=1.3.0
            pytest>=7.4.0
            REQEOF
          fi

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt --progress-spinner off || true
        continue-on-error: true